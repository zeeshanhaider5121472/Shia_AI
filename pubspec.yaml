name: shia_ai
description: Shia AI - Islamic prayers, ziyarat, duas, quran, hadith and more
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: 6.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  geolocator: ^13.0.1
  geocoding: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  #
  fonts:
    - family: Al Qalam Quran Majeed
      fonts:
        - asset: assets/fonts/al_qalam_regular.ttf
          weight: 400
        # - asset: assets/fonts/AlQalamQuranMajeedBold.ttf
        # weight: 700
